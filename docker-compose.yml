version: "1.0"

services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

  ojs_db:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: "${OJS_MYSQL_ROOT_PASSWORD:-ojsPwd}"
      MYSQL_DATABASE: "${OJS_DB_NAME:-ojs}"
      MYSQL_USER: "${OJS_DB_USER:-ojs}"
      MYSQL_PASSWORD: "${OJS_DB_PASSWORD:-ojsPwd}"
    volumes:
      - ./ojs/volumes/db:/var/lib/mysql
      - ./ojs/volumes/db-import:/docker-entrypoint-initdb.d
      #      - ./ojs/volumes/logs/db:/var/log/mysql
      #      - ./ojs/volumes/config/db.charset.conf:/etc/mysql/conf.d/charset.cnf
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/backend/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: /api
        VITE_STRAPI_URL: /cms
    restart: unless-stopped
    depends_on:
      - backend

  cms:
    build: ./cms
    restart: unless-stopped
    env_file:
      - ./cms/.env
    volumes:
      - ./cms/public/uploads:/cms/public/uploads
      - ./cms/data:/cms/data
    depends_on:
      - mysql

  ojs:
    image: "pkpofficial/${OJS_IMAGE:-ojs}:${OJS_VERSION:-latest}"
    volumes:
      - /etc/localtime:/etc/localtime
      - ./ojs/volumes/private:/var/www/files
      - ./ojs/volumes/public:/var/www/html/public
      - ./ojs/volumes/config/ojs.config.inc.php:/var/www/html/config.inc.php
      #      - ./ojs/volumes/logs/app:/var/log/apache2
      #      - ./ojs/volumes/config/apache.htaccess:/var/www/html/.htaccess
      #      - ./ojs/volumes/php.custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - ojs_db
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - cms
      - ojs

volumes:
  mysql-data:
